name: Causal RL Training (Manual)

# ─────────────────────────────────────────────────────────────────────────────
# Run MANUALLY to fit the causal graph and train the PPO policy.
# Recommended: weekly, or after any major regime change.
#
# Triggers: GitHub → Actions → "Causal RL Training (Manual)" → Run workflow
#           OR: gh workflow run causal_train.yml
#
# Runtime: ~60-120 min per universe on CPU (ubuntu-latest).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe (ALL / EQUITY_SECTORS / FI_COMMODITIES / COMBINED)"
        required: false
        default: "ALL"
      updates:
        description: "Number of PPO update iterations (default: 200)"
        required: false
        default: "200"
      graph_method:
        description: "Causal graph method: lingam | granger | pcmci"
        required: false
        default: "lingam"

jobs:
  causal-train:
    runs-on: ubuntu-latest
    timeout-minutes: 480      # 8 hours — causal graph + PPO training

    strategy:
      matrix:
        universe: [EQUITY_SECTORS, FI_COMMODITIES, COMBINED]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Override graph method if specified
        run: |
          if [ "${{ github.event.inputs.graph_method }}" != "" ]; then
            sed -i "s/GRAPH_METHOD.*=.*/GRAPH_METHOD = \"${{ github.event.inputs.graph_method }}\"/" config.py
          fi

      - name: Run Causal RL training — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python causal_trainer.py \
            --universe ${{ matrix.universe }} \
            --updates  ${{ github.event.inputs.updates || '200' }}

      - name: Report
        if: always()
        run: echo "Training complete for ${{ matrix.universe }}"
