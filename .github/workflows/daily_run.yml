name: Causal RL Daily Inference

on:
  schedule:
    - cron: "30 23 * * 1-5"    # 22:30 UTC Mon–Fri
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe (ALL / EQUITY_SECTORS / FI_COMMODITIES / COMBINED)"
        required: false
        default: "ALL"

jobs:
  daily-inference:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      matrix:
        universe: [EQUITY_SECTORS, FI_COMMODITIES, COMBINED]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Causal RL inference — ${{ matrix.universe }}
        env:
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          CAUSAL_RL_UNIVERSE:   ${{ matrix.universe }}
        run: python trainer.py
